<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:Helvetica, Arial, sans-serif;
}

.container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {
    opacity:0;
    transform:translateY(20px);
  }
  to {
    opacity:1;
    transform:translateY(0);
  }
}

h1 {
  font-size:110px;
  margin:0;
  letter-spacing:-4px;
  font-weight:500;
  transition:0.3s;
}

h1:hover {
  letter-spacing:0px;
}

.slogan {
  margin-top:15px;
  font-size:14px;
  letter-spacing:4px;
  color:#888;
}

.start {
  margin-top:50px;
}

.start a {
  text-decoration:none;
  color:white;
  border:1px solid #888;
  padding:12px 35px;
  letter-spacing:2px;
  font-size:12px;
  transition:0.3s;
}

.start a:hover {
  border-color:white;
  background:white;
  color:black;
}

.footer {
  position:fixed;
  bottom:25px;
  width:100%;
  text-align:center;
  font-size:11px;
  color:#555;
  letter-spacing:3px;
}
</style>
</head>

<body>

<div class="container">
  <h1>UP DOWN</h1>
  <p class="slogan">FALL. RISE. REPEAT.</p>

  <div class="start">
    <a href="shop.html">START</a>
  </div>
</div>

<p class="footer">EST. 2026</p>

</body>
</html>
