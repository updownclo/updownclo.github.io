<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background:#050505;
  color:white;
  font-family:Arial;
  margin:0;
}

/* NAV */
.nav {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  font-size:12px;
  letter-spacing:2px;
  background:#050505;
  z-index:10;
  box-sizing:border-box;
}

.nav a {
  color:white;
  text-decoration:none;
  margin-left:15px;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:40px;
  padding:100px 40px;
}

.product {
  text-align:center;
}

.image-wrapper {
  position:relative;
}

.image-wrapper img {
  width:100%;
  transition:0.3s;
  cursor:pointer;
}

.image-wrapper img:hover {
  transform:scale(1.05);
}

.overlay {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  opacity:0;
  font-size:12px;
  letter-spacing:3px;
  transition:0.3s;
}

.image-wrapper:hover .overlay {
  opacity:1;
}

.product p {
  margin-top:15px;
  letter-spacing:2px;
  font-size:12px;
}

.price {
  color:#aaa;
}

.sizes {
  margin-top:10px;
}

.sizes span {
  display:inline-block;
  border:1px solid #555;
  padding:6px 10px;
  margin:3px;
  font-size:11px;
  cursor:pointer;
}

.sizes span.active {
  background:white;
  color:black;
}

.selected {
  font-size:11px;
  color:#aaa;
}

.buy {
  display:inline-block;
  margin-top:12px;
  padding:8px 20px;
  border:1px solid white;
  color:white;
  text-decoration:none;
  font-size:11px;
  cursor:pointer;
}

.buy:hover {
  background:white;
  color:black;
}

.note {
  font-size:10px;
  color:#777;
}

/* IMAGE POPUP */
.popup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  z-index:99;
}

.popup img {
  width:90%;
}

/* ORDER POPUP */
.order-popup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.92);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.order-box {
  background:#111;
  width:320px;
  padding:35px;
  text-align:center;
  position:relative;
}

.order-box p {
  white-space:pre-line;
  line-height:1.8;
  font-size:13px;
  letter-spacing:1px;
}

.order-box button,
.order-box a {
  display:block;
  width:100%;
  margin-top:15px;
  padding:12px;
  background:none;
  border:1px solid white;
  color:white;
  text-decoration:none;
  cursor:pointer;
  box-sizing:border-box;
}

.order-box button:hover,
.order-box a:hover {
  background:white;
  color:black;
}

.close {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
}

/* SOCIAL */
.social {
  position:fixed;
  bottom:15px;
  width:100%;
  text-align:center;
}

.social img {
  width:18px;
  margin:0 10px;
  opacity:0.6;
}

.social img:hover {
  opacity:1;
}

/* MOBILE */
@media (max-width: 768px) {
  .products {
    grid-template-columns:1fr;
    padding:90px 20px;
  }

  .nav {
    font-size:11px;
  }
}
</style>
</head>

<body>

<div class="nav">
  <span>UP DOWN</span>
  <div>
    <a href="index.html">HOME</a>
    <a href="https://www.instagram.com/updown.clo/" target="_blank">IG</a>
  </div>
</div>

<div class="products">

  <div class="product">
    <div class="image-wrapper">
      <img src="black.png" onclick="openImage('black.png')">
      <div class="overlay">VIEW</div>
    </div>

    <p>BLACK T-SHIRT</p>
    <p class="price">30€</p>

    <div class="sizes">
      <span>S</span>
      <span>M</span>
      <span>L</span>
      <span>XL</span>
    </div>

    <p class="selected">Selected size: -</p>

    <a class="buy" onclick="buyProduct('BLACK T-SHIRT', '30€', this)">BUY</a>
    <p class="note">Copy message & send us on Instagram</p>
  </div>

  <div class="product">
    <div class="image-wrapper">
      <img src="white.png" onclick="openImage('white.png')">
      <div class="overlay">VIEW</div>
    </div>

    <p>WHITE T-SHIRT</p>
    <p class="price">30€</p>

    <div class="sizes">
      <span>S</span>
      <span>M</span>
      <span>L</span>
      <span>XL</span>
    </div>

    <p class="selected">Selected size: -</p>

    <a class="buy" onclick="buyProduct('WHITE T-SHIRT', '30€', this)">BUY</a>
    <p class="note">Copy message & send us on Instagram</p>
  </div>

</div>

<div class="popup" id="popup" onclick="closeImage()">
  <img id="popup-img">
</div>

<div class="order-popup" id="orderPopup">
  <div class="order-box">
    <span class="close" onclick="closeOrderPopup()">✕</span>

    <p id="orderText"></p>

    <button onclick="copyMessage()">COPY MESSAGE</button>

    <a href="https://www.instagram.com/updown.clo/" target="_blank">
      OPEN INSTAGRAM
    </a>
  </div>
</div>

<div class="social">
  <a href="https://www.instagram.com/updown.clo/" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
  </a>

  <a href="https://www.tiktok.com/@updown.clo?lang=en" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png">
  </a>
</div>

<script>
let currentMessage = "";

function openImage(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popup-img").src = src;
}

function closeImage() {
  document.getElementById("popup").style.display = "none";
}

document.querySelectorAll(".sizes span").forEach(size => {
  size.addEventListener("click", function() {
    let container = this.parentElement;
    let siblings = container.querySelectorAll("span");

    siblings.forEach(s => s.classList.remove("active"));
    this.classList.add("active");

    let selectedText = container.parentElement.querySelector(".selected");
    selectedText.innerText = "Selected size: " + this.innerText;
  });
});

function buyProduct(product, price, button) {
  let productBox = button.parentElement;
  let selectedSize = productBox.querySelector(".selected").innerText.replace("Selected size: ", "");

  if (selectedSize === "-") {
    alert("Please select a size first.");
    return;
  }

  currentMessage =
`UP DOWN ORDER

Product: ${product}
Size: ${selectedSize}
Price: ${price}`;

  document.getElementById("orderText").innerText = currentMessage;
  document.getElementById("orderPopup").style.display = "flex";
}

function copyMessage() {
  navigator.clipboard.writeText(currentMessage);
  alert("Message copied.");
}

function closeOrderPopup() {
  document.getElementById("orderPopup").style.display = "none";
}
</script>

</body>
</html>
